monitor.alsa.rules = [
  {
    # === OUTPUT: Internal Speakers ===
    matches = [
      { node.name = "alsa_output.platform-sound.HiFi__Speaker__sink" }
    ]
    actions = {
      update-props = {
        audio.format     = "S16LE"
        audio.rate       = 48000
        audio.channels   = 2
        audio.position   = [ "FL" "FR" ]
        api.alsa.period-size = 4096
        api.alsa.period-num  = 6
        api.alsa.headroom    = 512
      }
    }
  },
  {
    # === OUTPUT: DisplayPort / USB-C DP ===
    matches = [
      { node.name = "alsa_output.platform-sound.HiFi__HDMI__sink" }
    ]
    actions = {
      update-props = {
        audio.format         = "S16LE"
        audio.rate           = 48000
        audio.channels       = 2
        audio.position       = [ "FL" "FR" ]
        api.alsa.period-size = 4096
        api.alsa.period-num  = 4
        api.alsa.headroom    = 512
        priority.session     = 1150
      }
    }
  },
  {
    # === INPUT: Microphones ===
    matches = [
      { node.name = "alsa_input.platform-sound.HiFi__Mic__source" }
    ]
    actions = {
      update-props = {
        audio.format     = "S16LE"
        audio.rate       = 44100
        audio.channels   = 2
        audio.position   = [ "FL" "FR" ]
      }
    }
  }
]
