Syntax 3

SectionVerb {
 EnableSequence [
  cset "name='DISPLAY_PORT_RX Audio Mixer MultiMedia2' 1" ]
 DisableSequence [
  cset "name='DISPLAY_PORT_RX Audio Mixer MultiMedia2' 0" ]
 Value {
  TQ "HiFi"
 }
}

SectionDevice."HDMI" {
 Comment "DisplayPort / USB-C DP Output"
 EnableSequence [
  cset "name='DISPLAY_PORT_RX Audio Mixer MultiMedia2' 1" ]
 DisableSequence [
  cset "name='DISPLAY_PORT_RX Audio Mixer MultiMedia2' 0" ]
 Value {
  PlaybackPriority 150
  PlaybackPCM "hw:${CardId},1"
  JackControl "DISPLAY_PORT_RX Jack"
  JackHWMute ""
 }
}
